name: Publish Package to npm

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          # 重要：配置 registry-url 以便后续通过 NODE_AUTH_TOKEN 鉴权
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Check types
        run: npm run typecheck
        
      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Publish to npm
        # 只有在 main 分支时才发包（虽然外层配置了 on.push.branches: main，这里再加一层防护）
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
